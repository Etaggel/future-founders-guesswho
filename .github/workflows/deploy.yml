name: Deploy FF Game

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  HOSTED_ZONE_ID: Z08719171MVGZ075P75Y8
  CERTIFICATE_ARN: arn:aws:acm:us-east-1:899654269390:certificate/0c919015-4cf0-456f-a6e0-e76a1d5c50fd

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Lint frontend
        run: npm run lint
        working-directory: web

      - name: Build frontend static site
        run: npm run build
        working-directory: web

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: Synthesize CDK
        run: npx cdk synth
        working-directory: infra

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend static site
        run: npm run build
        working-directory: web

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: CDK deploy
        run: npx cdk deploy FfGameEuWestStack --require-approval never
        working-directory: infra

      - name: Smoke test production
        run: |
          curl --fail --silent --show-error https://founders.legg.ie/ >/dev/null
          curl --fail --silent --show-error https://founders.legg.ie/runtime-config.json >/dev/null
